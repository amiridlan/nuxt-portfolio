name: Deploy to Netlify

on:
  push:
    branches:
      - main

jobs:
  deploy:
    name: Build and Deploy
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Cache node_modules
        uses: actions/cache@v4
        with:
          path: node_modules
          key: ${{ runner.os }}-node-${{ hashFiles('package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-node-

      - name: Install dependencies
        run: npm ci

      - name: Generate static site
        run: npm run generate
        env:
          NUXT_PUBLIC_R2_BASE_URL: ${{ secrets.R2_BASE_URL }}
          NUXT_PUBLIC_INSTAGRAM_URL: ${{ secrets.NUXT_PUBLIC_INSTAGRAM_URL }}
          NUXT_PUBLIC_WEBSITE_URL: ${{ secrets.NUXT_PUBLIC_WEBSITE_URL }}
          NUXT_PUBLIC_CONTACT_EMAIL: ${{ secrets.NUXT_PUBLIC_CONTACT_EMAIL }}

      - name: Install Netlify CLI
        run: npm install -g netlify-cli

      - name: Deploy to Netlify
        run: netlify deploy --prod --dir .output/public
        env:
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
          NETLIFY_SITE_ID: ${{ secrets.NETLIFY_SITE_ID }}
